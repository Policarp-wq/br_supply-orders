name: Supply Orders CI/CD

on:
  push:

jobs:
  backend_tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: supply_orders
          POSTGRES_USER: supply_orders
          POSTGRES_PASSWORD: supply_orders
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U supply_orders -d supply_orders"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run backend tests
        env:
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: "*"
          POSTGRES_DB: supply_orders
          POSTGRES_USER: supply_orders
          POSTGRES_PASSWORD: supply_orders
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: pytest -q
        working-directory: backend

  frontend_checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  build_and_push:
    runs-on: ubuntu-latest
    needs:
      - backend_tests
      - frontend_checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/br_supply_orders_backend:latest
            ${{ secrets.DOCKER_USERNAME }}/br_supply_orders_backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/br_supply_orders_frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/br_supply_orders_frontend:${{ github.sha }}
