services:
  postgres:
    image: postgres:16
    container_name: supply-orders-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: supply_orders
      POSTGRES_USER: supply_orders
      POSTGRES_PASSWORD: supply_orders
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supply_orders -d supply_orders"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: supply-orders-backend
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: dev-insecure-change-me-in-production
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_DB: supply_orders
      POSTGRES_USER: supply_orders
      POSTGRES_PASSWORD: supply_orders
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
