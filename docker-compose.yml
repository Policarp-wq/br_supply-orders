services:
  postgres:
    image: postgres:16
    container_name: supply-orders-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: supply_orders
      POSTGRES_USER: supply_orders
      POSTGRES_PASSWORD: supply_orders
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supply_orders -d supply_orders"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
